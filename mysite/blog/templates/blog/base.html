<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}My Blog{% endblock %}</title>
</head>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    margin:0;
}

/* ✅ Apply flex here */
nav {
    background:#333;
    color:white;
    padding:10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* optional logo */
nav .logo {
    font-weight: bold;
    font-size: 18px;
}

/* links container */
nav .links a {
    color:white;
    margin-left:15px;
    text-decoration:none;
}

.container {
    width:800px;
    margin:20px auto;
    background:white;
    padding:20px;
}
</style>

<body>

<nav>
    <div class="logo">My Blog</div>

    <div class="links">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'about' %}">About</a>
        <a href="{% url 'create_post' %}">Create Post</a>
    </div>
</nav>

<div class="container">

    {% if messages %}
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
