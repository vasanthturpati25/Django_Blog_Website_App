{% extends 'blog/base.html' %}

{% block content %}
<h2>Create Post</h2>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="title" placeholder="Title"><br><br>
    <textarea name="content" placeholder="Content"></textarea><br><br>
    <button type="submit">Create</button>
</form>

{% endblock %}
